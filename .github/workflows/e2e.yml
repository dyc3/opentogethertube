name: Playwright Tests

on:
  pull_request:
    paths-ignore:
      - ".vscode/**"
      - "docs/**"
      - "env/**"
      - "**/*.md"
      - ".gitpod.yml"
  push:
    branches:
      - master
    paths-ignore:
      - ".vscode/**"
      - "docs/**"
      - "env/**"
      - "**/*.md"
      - ".gitpod.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  component:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x, 26.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          check-latest: true

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            node_modules-${{ runner.os }}-node-${{ matrix.node-version }}-

      - run: command -v corepack || npm install --global corepack@latest
      - run: corepack enable
      - run: yarn --immutable
      - run: yarn workspace ott-common build

      - name: "Component Tests"
        run: yarn workspace ott-client run test:component
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x, 26.x]
    env:
      # this is safe because it's only used for testing
      SESSION_SECRET: LERTmi2Jiz6gJHt21AZUWBstezP41P3odxzEsCo1w4zL8XqGyjGdMZ2QPXUenVQQ2fY1xzGBYseB1g9teRHbxF
      CI: true
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          check-latest: true

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            node_modules-${{ runner.os }}-node-${{ matrix.node-version }}-
      - run: command -v corepack || npm install --global corepack@latest
      - run: corepack enable
      - run: yarn install --immutable

      - name: Build client
        run: yarn run build

      - run: yarn playwright install --with-deps chromium
      - run: yarn workspace ott-server run sequelize db:migrate

      - name: "E2E Tests"
        run: yarn test:e2e
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
  e2e-grafana:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x, 26.x]
        package:
          - ott-vis-panel
          - ott-vis-datasource
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            node_modules-${{ runner.os }}-node-${{ matrix.node-version }}-

      - run: command -v corepack || npm install --global corepack@latest
      - run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - run: yarn workspace ${{ matrix.package }} build

      - name: Check for backend
        id: check-for-backend
        working-directory: packages/${{ matrix.package }}
        run: |
          if [ -f "Magefile.go" ]
          then
            echo "has-backend=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go environment
        if: steps.check-for-backend.outputs.has-backend == 'true'
        uses: actions/setup-go@v3
        with:
          go-version: "1.21"

      - name: Test backend
        if: steps.check-for-backend.outputs.has-backend == 'true'
        uses: magefile/mage-action@v2
        with:
          version: latest
          args: coverage

      - name: Build backend
        if: steps.check-for-backend.outputs.has-backend == 'true'
        uses: magefile/mage-action@v2
        with:
          version: latest
          args: buildAll

      - name: Check for E2E
        id: check-for-e2e
        working-directory: packages/${{ matrix.package }}
        run: |
          if [ -d "cypress" ]
          then
            echo "has-e2e=true" >> $GITHUB_OUTPUT
          fi

      - name: Start grafana docker
        if: steps.check-for-e2e.outputs.has-e2e == 'true'
        working-directory: packages/${{ matrix.package }}
        run: docker compose up -d

      - name: Run e2e tests
        if: steps.check-for-e2e.outputs.has-e2e == 'true'
        run: yarn workspace ${{ matrix.package }} run e2e

      - name: Stop grafana docker
        if: steps.check-for-e2e.outputs.has-e2e == 'true'
        working-directory: packages/${{ matrix.package }}
        run: docker compose down
